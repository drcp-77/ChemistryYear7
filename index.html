<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Year 7 Chemistry Revision</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f8f7;
      --panel: #ffffff;
      --ink: #15201d;
      --muted: #60716c;
      --line: #d8e5e1;
      --accent: #136f63;
      --accent-2: #e6f4f1;
      --warn: #fff4df;
      --danger: #8b2e20;
      --shadow: 0 10px 30px rgba(21, 32, 29, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 36px;
      display: grid;
      gap: 18px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      letter-spacing: 0;
    }

    h2 { font-size: 1.35rem; }
    h3 { font-size: 1rem; }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 76ch;
    }

    .exam {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 170px;
    }

    .exam strong {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .sidebar {
      position: sticky;
      top: 16px;
      display: grid;
      gap: 14px;
      padding: 14px;
    }

    .audio-controls, .tools {
      display: grid;
      gap: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button, select, input { font: inherit; }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.active {
      background: var(--accent-2);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    select, input[type="range"] {
      width: 100%;
    }

    select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }

    .status {
      min-height: 1.4em;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .topic-nav {
      display: grid;
      gap: 8px;
    }

    .topic-button {
      text-align: left;
      display: grid;
      gap: 3px;
    }

    .topic-button span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
    }

    .content {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .topic-head {
      display: grid;
      gap: 8px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--accent-2);
      color: var(--accent);
      padding: 4px 9px;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      display: grid;
      gap: 8px;
      background: #fff;
      min-width: 0;
    }

    .card p, li {
      line-height: 1.48;
    }

    .mini-title {
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li + li { margin-top: 5px; }

    .practical {
      background: var(--warn);
      border-color: #ead5ac;
    }

    .practical .mini-title { color: var(--danger); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 8px 6px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
    }

    details[open] {
      background: var(--accent-2);
      border-color: var(--accent);
    }

    summary {
      cursor: pointer;
      font-weight: 720;
      line-height: 1.45;
    }

    details p {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
    }

    .speaker-line {
      border-left: 4px solid var(--accent);
      padding: 9px 10px;
      background: var(--accent-2);
      border-radius: 8px;
      line-height: 1.5;
    }

    .diagram-card {
      grid-column: 1 / -1;
    }

    .diagram {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfc;
    }

    .diagram svg {
      display: block;
      width: 100%;
      min-width: 660px;
      height: auto;
    }

    .label-check {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .exam-practice {
      grid-column: 1 / -1;
      background: #f9fcfb;
    }

    .task-list {
      display: grid;
      gap: 9px;
    }

    .task-prompt {
      color: var(--ink);
      line-height: 1.48;
    }

    .task-type {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      background: var(--accent-2);
      color: var(--accent);
      padding: 3px 8px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .memory-card {
      background: #fffdf7;
      border-color: #ead5ac;
    }

    .memory-card .mini-title {
      color: #8b5b12;
    }

    .hidden { display: none; }

    @media (max-width: 840px) {
      main { width: min(100% - 20px, 1180px); padding-top: 14px; }
      header { grid-template-columns: 1fr; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .grid { grid-template-columns: 1fr; }
      .label-check { grid-template-columns: 1fr; }
      .buttons { grid-template-columns: 1fr; }
      button, select { min-height: 44px; }
      .diagram svg { min-width: 620px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Year 7 Chemistry Revision</h1>
        <p class="sub">Light, exam-focused study for Matter and Particles, Chemical Reactions, Separating Mixtures, and Acids, Alkalis and pH. Short blocks, practical skills, quick recall, and UK voice audio.</p>
      </div>
      <div class="exam">
        <strong>Study mode</strong>
        Ready for tomorrow
      </div>
    </header>

    <section class="layout">

        <div class="audio-controls">
          <div class="buttons">

            <button type="button" id="stop">Stop</button>

          <label>

          <label>
            Voice

          </label>

          <div class="status" id="status">Ready. Choose a topic and press Play.</div>
        </div>

        <div class="tools">
          <div class="buttons">
            <button class="active" type="button" data-mode="study">Study</button>
            <button type="button" data-mode="exam">Exam</button>
            <button type="button" data-mode="quiz">Quiz</button>
            <button type="button" data-mode="script">Script</button>
          </div>
        </div>

        <nav class="topic-nav" id="topicNav" aria-label="Chemistry topics"></nav>
      </aside>

      <article class="panel content" id="content"></article>
    </section>
  </main>

    const content = document.getElementById("content");
    const topicNav = document.getElementById("topicNav");
    const playButton = document.getElementById("play");
    const pauseButton = document.getElementById("pause");
    const stopButton = document.getElementById("stop");
    const rateInput = document.getElementById("rate");
    const voiceSelect = document.getElementById("voice");
    const statusBox = document.getElementById("status");
    const modeButtons = [...document.querySelectorAll("[data-mode]")];

    let topicIndex = 0;
    let mode = "study";
    let voices = [];
    let scriptIndex = 0;
    let playing = false;

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function renderNav() {
      topicNav.innerHTML = "";
      topics.forEach((topic, index) => {
        const button = el("button", "topic-button" + (index === topicIndex ? " active" : ""));
        button.type = "button";
        button.innerHTML = `${topic.title}<span>${topic.examFocus.join(" | ")}</span>`;
        button.addEventListener("click", () => {
          stopAudio();
          topicIndex = index;
          scriptIndex = 0;
          render();
          setStatus(`Selected: ${topic.title}`);
        });
        topicNav.appendChild(button);
      });
    }

    function renderBadges(topic, parent) {
      const row = el("div", "badge-row");
      topic.examFocus.forEach(item => row.appendChild(el("span", "badge", item)));
      parent.appendChild(row);
    }

    function renderStudy(topic) {
      const grid = el("div", "grid");
      const idea = el("section", "card");
      idea.appendChild(el("div", "mini-title", "Big idea"));
      idea.appendChild(el("p", "", topic.bigIdea));
      grid.appendChild(idea);

      const practical = el("section", "card practical");
      practical.appendChild(el("div", "mini-title", "Practical skills"));
      const practicalList = el("ul");
      topic.practical.forEach(item => practicalList.appendChild(el("li", "", item)));
      practical.appendChild(practicalList);
      grid.appendChild(practical);

      if (topic.memory) {
        const memory = el("section", "card memory-card");
        memory.appendChild(el("div", "mini-title", topic.memory.title));
        const memoryList = el("ul");
        topic.memory.points.forEach(item => memoryList.appendChild(el("li", "", item)));
        memory.appendChild(memoryList);
        grid.appendChild(memory);
      }

      topic.mustKnow.forEach(item => {
        const card = el("section", "card");
        card.appendChild(el("h3", "", item.title));
        card.appendChild(el("p", "", item.text));
        grid.appendChild(card);
      });

      if (topic.diagram) renderDiagram(topic, grid);
      if (topic.examPractice) renderExamPractice(topic, grid);

      content.appendChild(grid);
    }

    function renderDiagram(topic, parent) {
      const card = el("section", "card diagram-card");
      card.appendChild(el("div", "mini-title", topic.diagram.title));
      const diagram = el("div", "diagram");
      diagram.innerHTML = topic.diagram.svg;
      card.appendChild(diagram);

      const labelCheck = el("div", "label-check");
      topic.diagram.labels.forEach(([q, a], index) => {
        const details = el("details");
        details.appendChild(el("summary", "", `Label check ${index + 1}: ${q}`));
        details.appendChild(el("p", "", a));
        labelCheck.appendChild(details);
      });
      card.appendChild(labelCheck);
      parent.appendChild(card);
    }

    function renderExamPractice(topic, parent) {
      const card = el("section", "card exam-practice");
      card.appendChild(el("div", "mini-title", "Exam practice"));
      const tasks = el("div", "task-list");
      topic.examPractice.forEach(([type, prompt, answer], index) => {
        const details = el("details");
        const summary = el("summary");
        const tag = el("span", "task-type", type);
        const text = el("span", "task-prompt", ` ${index + 1}. ${prompt}`);
        summary.appendChild(tag);
        summary.appendChild(text);
        details.appendChild(summary);
        details.appendChild(el("p", "", answer));
        tasks.appendChild(details);
      });
      card.appendChild(tasks);
      parent.appendChild(card);
    }

    function renderVocab(topic) {
      const card = el("section", "card");
      card.appendChild(el("div", "mini-title", "Vocabulary thesaurus"));
      const table = el("table");
      table.innerHTML = "<thead><tr><th>English</th><th>Spanish</th></tr></thead>";
      const body = el("tbody");
      topic.vocab.forEach(([en, es]) => {
        const row = el("tr");
        row.innerHTML = `<td>${en}</td><td>${es}</td>`;
        body.appendChild(row);
      });
      table.appendChild(body);
      card.appendChild(table);
      content.appendChild(card);
    }

    function renderQuiz(topic) {
      const grid = el("div", "grid");
      topic.questions.forEach(([q, a], index) => {
        const details = el("details");
        const summary = el("summary", "", `${index + 1}. ${q}`);
        const answer = el("p", "", a);
        details.appendChild(summary);
        details.appendChild(answer);
        grid.appendChild(details);
      });
      content.appendChild(grid);
    }

    function renderScript(topic) {
      const card = el("section", "card");
      card.appendChild(el("div", "mini-title", "Speaker script"));
      topic.script.forEach((line, index) => {
        const p = el("p", index === scriptIndex ? "speaker-line" : "", line);
        card.appendChild(p);
      });
      content.appendChild(card);
    }

    function render() {
      const topic = topics[topicIndex];
      content.innerHTML = "";
      const head = el("section", "topic-head");
      head.appendChild(el("h2", "", topic.title));
      head.appendChild(el("p", "sub", topic.subtitle));
      renderBadges(topic, head);
      content.appendChild(head);

      if (mode === "study") {
        renderStudy(topic);
        renderVocab(topic);
        renderQuiz(topic);
      }
      if (mode === "exam") {
        const grid = el("div", "grid");
        if (topic.diagram) renderDiagram(topic, grid);
        if (topic.examPractice) renderExamPractice(topic, grid);
        content.appendChild(grid);
      }
      if (mode === "quiz") renderQuiz(topic);
      if (mode === "script") renderScript(topic);

      renderNav();
      modeButtons.forEach(button => button.classList.toggle("active", button.dataset.mode === mode));
    }

    function loadVoices() {
      voices = "speechSynthesis" in window ? window.speechSynthesis.getVoices() : [];
      voiceSelect.innerHTML = "";
      const englishVoices = voices.filter(voice => /^en[-_]/i.test(voice.lang || ""));
      const usable = englishVoices.length ? englishVoices : voices;

      usable.forEach(voice => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})`;
        voiceSelect.appendChild(option);
      });

      const preferred = usable.find(voice => /ryan/i.test(voice.name))
        || usable.find(voice => /en[-_]gb/i.test(voice.lang || ""))
        || usable[0];

      if (preferred) voiceSelect.value = preferred.name;

      if (!usable.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "Default browser voice";
        voiceSelect.appendChild(option);
      }
    }

    function selectedVoice() {
      return voices.find(voice => voice.name === voiceSelect.value) || null;
    }

    function speakNext() {
      if (!playing) return;
      if (!("speechSynthesis" in window)) {
        setStatus("Speech is not supported in this browser.");
        playing = false;
        return;
      }

      const topic = topics[topicIndex];
      if (scriptIndex >= topic.script.length) {
        setStatus("Finished this topic.");
        playing = false;
        scriptIndex = 0;
        render();
        return;
      }

      render();
      const line = topic.script[scriptIndex];
      const utterance = new SpeechSynthesisUtterance(line);
      utterance.lang = "en-GB";
      utterance.rate = Number(rateInput.value);
      utterance.pitch = 1;
      utterance.voice = selectedVoice();
      utterance.onstart = () => setStatus(`Playing line ${scriptIndex + 1} of ${topic.script.length}`);
      utterance.onerror = () => {
        setStatus("Audio error. Try another browser voice.");
        playing = false;
      };
      utterance.onend = () => {
        scriptIndex += 1;
        window.setTimeout(speakNext, line.includes("Quick check") ? 3200 : 450);
      };
      window.speechSynthesis.speak(utterance);
    }

    function playAudio() {
      if (!("speechSynthesis" in window)) {
        setStatus("Speech is not supported in this browser.");
        return;
      }

      if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
        playing = true;
        setStatus("Playing.");
        return;
      }

      window.speechSynthesis.cancel();
      playing = true;
      speakNext();
    }

    function pauseAudio() {
      if ("speechSynthesis" in window && window.speechSynthesis.speaking) {
        window.speechSynthesis.pause();
        setStatus("Paused.");
      }
    }

    function stopAudio() {
      playing = false;
      scriptIndex = 0;
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      setStatus("Stopped.");
      render();
    }

    modeButtons.forEach(button => {
      button.addEventListener("click", () => {
        mode = button.dataset.mode;
        render();
      });
    });

    playButton.addEventListener("click", playAudio);
    pauseButton.addEventListener("click", pauseAudio);
    stopButton.addEventListener("click", stopAudio);

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    } else {
      setStatus("Speech is not supported in this browser.");
    }

    render();
  </script>
</body>
